<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>لعبة الحواجز</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>لعبة الحواجز</h1>
        <p class="subtitle">الأزرق إلى الأسفل، الأحمر إلى الأعلى</p>
      </div>
      <button id="rulesBtn" class="icon-btn" type="button" aria-label="قوانين اللعبة">؟</button>
    </header>

    <section class="room-panel" aria-label="الغرفة">
      <label class="room-code">
        <span>كود اللعبة</span>
        <input id="room" readonly>
      </label>
      <div class="room-actions">
        <button id="joinBtn" class="primary-btn" type="button">دخول</button>
        <button id="shareBtn" type="button">مشاركة</button>
      </div>
    </section>

    <section class="game-info" aria-live="polite">
      <div class="info-card">
        <span>الدور</span>
        <strong id="turnInfo">غير متصل</strong>
      </div>
      <div class="info-card">
        <span>لونك</span>
        <strong id="playerInfo">-</strong>
      </div>
      <div id="status" class="status-pill">غير متصل</div>
    </section>

    <section class="tools" aria-label="أدوات اللعب">
      <button id="moveMode" class="active" type="button">تحريك</button>
      <button id="wallMode" type="button">حاجز</button>
      <button id="restartBtn" type="button">إعادة</button>
    </section>

    <div class="board-wrap">
      <div class="goal-label red-label">هدف الأحمر</div>
      <div id="board" class="board"></div>
      <div class="goal-label blue-label">هدف الأزرق</div>
    </div>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div id="modalIcon" class="modal-icon">!</div>
      <h2 id="modalTitle"></h2>
      <div id="modalBody" class="modal-body"></div>
      <label id="dontShowWrap" class="dont-show hidden">
        <input id="dontShowRules" type="checkbox">
        <span>عدم الإظهار مرة أخرى</span>
      </label>
      <button id="modalOk" class="primary-btn" type="button">تم</button>
      <button id="modalCancel" class="secondary-btn hidden" type="button">إلغاء</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
